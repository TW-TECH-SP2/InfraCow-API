name: Docker Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: usuario_banco
          POSTGRES_PASSWORD: senha_usuario_banco
          POSTGRES_DB: nome_banco
        options: >-
          --health-cmd="pg_isready -U usuario_banco -d nome_banco"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Iniciar API e validar /health
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: usuario_banco
          DB_PASSWORD: senha_usuario_banco
          DB_NAME: nome_banco
          DB_SSL: false
          PORT: 3000
        run: |
          npm start &
          for i in {1..20}; do
            if curl -s http://localhost:3000/health | grep -q '"status":"ok"'; then
              echo "API pronta"
              exit 0
            fi
            sleep 3
          done
          echo "Falha ao iniciar a API"
          exit 1

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/infracow-api:latest

      - name: Trigger deploy no Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

